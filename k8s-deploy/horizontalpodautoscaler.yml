kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2

metadata:
  name: todo-hpa
  namespace: todo-ns

spec:
  scaleTargetRef:
    kind: Deployment
    name: todo-app-deployment
    apiVersion: apps/v1

    minReplicas: 1
    maxReplicas: 5

    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 10
            

